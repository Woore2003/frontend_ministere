<header class="bg-white sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-10">
    <div class="flex items-center h-20 justify-between">

      <!-- Logo + Sigle -->
      <a routerLink="/" class="flex items-center gap-2 flex-shrink-0" >
        <!-- Logo -->
        <div class="w-16 h-16 flex-shrink-0">
          <img
            [src]="ministere()?.logo ? getImageUrl(ministere()!.logo) : 'assets/images/armoirie.png'"
            [alt]="ministere()?.nomReel || 'Burkina Faso'"
            class="w-full h-full object-contain"
          />
        </div>

        <!-- Sigle du Ministère + Burkina Faso -->
       <div class="hidden md:flex flex-col leading-tight max-w-xs">
          <span class="text-xl font-bold text-slate-900 break-words">
            {{ ministere()?.nomReel || 'Burkina Faso' }}
          </span>
          <span class="text-sm font-medium text-danger-500">
            Burkina Faso
          </span>
        </div>
      </a>

      <!-- Navigation Desktop -->
      <nav class="hidden lg:flex items-center gap-1 ml-12"> <!-- ml-12 pour espacer le menu du logo -->

<a (click)="goToAccueil()"
   class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-primary-600 hover:bg-primary-50 transition-colors whitespace-nowrap cursor-pointer">
   Accueil
</a>
        <!-- <a routerLink="/" routerLinkActive="text-primary-600" [routerLinkActiveOptions]="{exact:true}"
           class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-primary-600 hover:bg-primary-50 transition-colors whitespace-nowrap">
          Accueil
        </a>-->

<div class="relative group">
  <!-- Bouton parent -->
  <button
    [ngClass]="{
      'text-primary-600 bg-primary-50': isMinistereActive(),
      'text-slate-600': !isMinistereActive()
    }"
    class="px-3 py-2 rounded-lg text-sm font-medium hover:text-primary-600 hover:bg-primary-50 flex items-center gap-1 transition-colors whitespace-nowrap">
    Ministère
    <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <!-- Dropdown -->
  <div class="absolute top-full left-0 mt-2 w-56 bg-white rounded-lg shadow-md border border-slate-100 py-1 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
    <a routerLink="/ministere/ministre"
       routerLinkActive="text-primary-600 bg-primary-50"
       [routerLinkActiveOptions]="{ exact: true }"
       class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
       Le Ministre
    </a>
    <a routerLink="/ministere/missions"
       routerLinkActive="text-primary-600 bg-primary-50"
       [routerLinkActiveOptions]="{ exact: true }"
       class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
       Missions
    </a>
    <a routerLink="/ministere/structures"
       routerLinkActive="text-primary-600 bg-primary-50"
       [routerLinkActiveOptions]="{ exact: true }"
       class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
       Structures
    </a>
    <a routerLink="/ministere/projets_programmes"
       routerLinkActive="text-primary-600 bg-primary-50"
       [routerLinkActiveOptions]="{ exact: true }"
       class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
       Projets et programmes
    </a>
  </div>
</div>

       <a 
  (click)="goToSection('actualites'); setActive('actualites')"
  [ngClass]="{
    'text-primary-600 bg-primary-50': activeSection === 'actualites',
    'text-slate-600': activeSection !== 'actualites'
  }"
  class="px-3 py-2 rounded-lg text-sm font-medium hover:text-primary-600 hover:bg-primary-50 cursor-pointer">
  Actualités

  <a

          Grands Chantiers
        </a>-->

        
        <!--DROPDOWN-->
        <div class="relative group">
          <!-- Bouton parent -->
          <button
            [ngClass]="{
              'text-primary-600 bg-primary-50': isRessourcesActive(),
              'text-slate-600': !isRessourcesActive()
            }"
            class="px-3 py-2 rounded-lg text-sm font-medium hover:text-primary-600 hover:bg-primary-50 flex items-center gap-1 transition-colors whitespace-nowrap">
            Ressources 
            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

                <!-- Dropdown -->
              <div class="absolute top-full left-0 mt-2 w-56 bg-white rounded-lg shadow-md border border-slate-100 py-1 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                  <a routerLink="/ressources/photo"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    Photos
                  </a>
                  <a routerLink="/ressources/documents"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    Documents
                  </a>
                  <a routerLink="/ressources/video"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    Vidéo
                  </a>
                  <a routerLink="/ressources/agritube"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    AgriTube
                  </a>
                </div>
        </div>
        <!--DROPDOWN-->
        <div class="relative group">
          <!-- Bouton parent -->
          <button
            [ngClass]="{
              'text-primary-600 bg-primary-50': isAnnoncesActive(),
              'text-slate-600': !isAnnoncesActive()
            }"
            class="px-3 py-2 rounded-lg text-sm font-medium hover:text-primary-600 hover:bg-primary-50 flex items-center gap-1 transition-colors whitespace-nowrap">
            Annonces
            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

                <!-- Dropdown -->
              <div class="absolute top-full left-0 mt-2 w-56 bg-white rounded-lg shadow-md border border-slate-100 py-1 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                  <a routerLink="/annonces/communiques"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    Communiqués
                  </a>
                  <a routerLink="/annonces/politiques"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    Recrutements
                  </a>
                  <a routerLink="/annonces/stage"
                    routerLinkActive="text-primary-600 bg-primary-50"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="block px-4 py-2 text-sm text-slate-600 hover:bg-primary-50 hover:text-primary-600 transition-colors">
                    Stage
                  </a>
                </div>
        </div>
        <a 
          routerLink="/contact"
          (click)="activeSection = ''"
          routerLinkActive="text-primary-600 bg-primary-50"
          class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-primary-600 hover:bg-primary-50 transition-colors whitespace-nowrap">
          Contact
        </a>

       <!--  <a routerLink="/contact" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-primary-600 hover:bg-primary-50 transition-colors whitespace-nowrap">
          Contact
        </a>-->
      </nav>

      <!-- Actions -->
      <div class="flex items-center gap-2 ml-6">
        <button (click)="toggleSearch()" class="p-2 rounded-lg text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </button>
        <a routerLink="/admin" class="hidden sm:inline-flex items-center gap-2 px-4 py-2 bg-primary-500 text-white text-sm font-medium rounded-lg hover:bg-primary-600 transition-colors" style="background-color: #00843B;">
          Administration
        </a>
        <button (click)="toggleMobileMenu()" class="lg:hidden p-2 rounded-lg text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path *ngIf="mobileMenuOpen()" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            <path *ngIf="!mobileMenuOpen()" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
