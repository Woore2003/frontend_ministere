<section class="py-16 bg-gray-100">
  <div class="container mx-auto px-4 space-y-10">

    @for (m of ministresActifs(); track m.id) {
      <div class="bg-white shadow-xl rounded-3xl overflow-hidden flex flex-col md:flex-row border border-gray-200">

        <!-- ================== GAUCHE : PHOTO + INFOS ================== -->
        <div class="md:w-1/3 bg-gray-50 p-8 flex flex-col items-center border-r border-gray-200">

          <span class="px-4 py-1 mb-4 text-xs font-bold text-white rounded-full" style="background:#00843B;">
             MINISTRE
          </span>

          <div class="w-56 h-56 rounded-full overflow-hidden shadow-2xl ring-4 ring-primary-100 mb-6">
            <img *ngIf="m.photo; else svgFallback"
                 [src]="getImageUrl(m.photo)"
                 [alt]="m.nom + ' ' + m.prenom"
                 class="w-full h-full object-cover">
            <ng-template #svgFallback>
              <svg class="w-full h-full bg-gray-200 text-gray-500" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
              </svg>
            </ng-template>
          </div>

          <div class="space-y-4 w-full">
            <div class="flex justify-between bg-white rounded-lg p-3 shadow-sm border">
              <span class="font-semibold text-gray-600">Nom :</span>
              <span class="text-gray-900 font-medium">{{ m.nom }}</span>
            </div>
            <div class="flex justify-between bg-white rounded-lg p-3 shadow-sm border">
              <span class="font-semibold text-gray-600">Prénom :</span>
              <span class="text-gray-900 font-medium">{{ m.prenom }}</span>
            </div>
            <div class="flex justify-between bg-white rounded-lg p-3 shadow-sm border">
              <span class="font-semibold text-gray-600">Profession :</span>
              <span class="text-gray-900 font-medium">{{ m.profession }}</span>
            </div>
          </div>
        </div>

        <!-- ================== DROITE : MINISTERE + BIO ================== -->
        <div class="md:w-2/3 p-10 flex flex-col space-y-8">
          <div class="mb-10">
            <h3 class="text-xl font-bold text-gray-900 border-l-4 pl-3 mb-4" style="border-color:#00843B;">
              LE MINISTÈRE
            </h3>
            <article class="max-w-none text-black content-article text-base leading-relaxed text-justify"
                     *ngIf="ministere()?.missionGeneral as mission">
              <div [innerHTML]="formatContent(mission)"></div>
            </article>
          </div>

          <div>
            <h3 class="text-xl font-bold text-gray-900 border-l-4 pl-3 mb-4" style="border-color:#E30613;">
              BIOGRAPHIE
            </h3>
            <article *ngIf="m.biographie as biographie"
                     class="max-w-4xl mx-auto text-black text-base text-justify">
              <div [innerHTML]="formatContentTailwind(biographie)"></div>
            </article>
          </div>
        </div>

      </div>
    } @empty {
      <p class="text-center text-gray-500">Aucun ministre actif pour le moment.</p>
    }

  </div>
</section>
