 <!-- Bannière -->
    <div class="bg-gradient-to-r from-[#00843B] to-[#006B30] py-12">
      <div class="container mx-auto px-4">
        <h1 class="text-3xl font-bold text-white mb-2">Organigramme</h1>
        <nav class="text-green-100 text-sm">
          <a routerLink="/" class="hover:text-white">Accueil</a>
          <span class="mx-2">›</span>
          <a routerLink="/ministere/ministre" class="hover:text-white">Ministère</a>
          <span class="mx-2">›</span>
          <span class="text-white">Organigramme</span>
        </nav>
      </div>
    </div>


    
  
  <!-- Directions par niveau -->
<section class="py-16 bg-gray-50">
  <div class="container mx-auto px-4">
    <div class="max-w-6xl mx-auto">

      <!-- Organigramme Timeline -->
      <div class="relative">
        <!-- Ligne verticale gauche -->
        

         
        <!-- Vérifie s'il y a des niveaux / directions -->
        <ng-container *ngIf="niveaux() && niveaux().length > 0; else noData">
           <div class="absolute left-6 top-0 bottom-0 w-1 bg-green-200 rounded"></div>

          <!-- Boucle sur les niveaux -->
          <ng-container *ngFor="let niveau of niveaux(); let i = index">
            <div class="relative pl-20 mb-16 flex flex-col items-center">
              
              <!-- Badge niveau -->
              <div class="absolute left-0 top-4 flex items-center justify-center">
                <div class="w-12 h-12 rounded-full bg-green-600 text-white font-bold flex items-center justify-center shadow-md">
                  {{ i + 1 }}
                </div>
              </div>

              <!-- Cartes des directions -->
              <div class="flex flex-wrap justify-center gap-6">
                <div *ngFor="let direction of (groupedDirections()[niveau] || [])"
                     class="bg-white rounded-2xl p-6 shadow-md border border-gray-100
                     w-72 text-center hover:shadow-xl hover:-translate-y-2 transition-all duration-300">
                  
                  <!-- Image ou icône -->
                  <ng-container *ngIf="direction.photo; else iconPerson">
                    <img [src]="getImageUrl(direction.photo)" alt="{{ direction.name }}"
                         class="w-32 h-32 mx-auto mb-4 rounded-full object-cover border-2 border-green-200 shadow-lg">
                  </ng-container>
                  <ng-template #iconPerson>
                    <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-green-100 flex items-center justify-center shadow-md">
                      <svg class="w-10 h-10 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                      </svg>
                    </div>
                  </ng-template>

                  <!-- Nom et acronym -->
                  <h4 class="font-semibold text-gray-800 text-sm leading-tight mb-2">{{ direction.name }}</h4>
                  <p class="text-gray-500 text-xs mb-3">{{ direction.acronym }}</p>
                </div>
              </div>

            </div>
          </ng-container>

        </ng-container>

        <!-- Fallback si aucune donnée -->
        <ng-template #noData>
          <div class="text-center py-16">
            <svg class="w-16 h-16 text-neutral-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
              </path>
            </svg>
            <h3 class="text-lg font-medium text-neutral-700 mb-2">Aucune donnée disponible</h3>
          </div>
        </ng-template>

      </div>

    </div>
  </div>
</section>
