<!-- Bannière -->
<div class="relative bg-gradient-to-br from-[#00843B] to-[#00551F] py-16 overflow-hidden">
  <!-- Motif discret -->
  <div class="absolute inset-0 opacity-[0.07]"
       style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 12px 12px;"></div>

  <div class="container mx-auto px-4 relative">
    <span class="inline-block text-green-100/80 text-xs font-semibold tracking-[0.2em] uppercase mb-3">
      Ministère
    </span>
    <h1 class="font-serif text-4xl md:text-5xl font-semibold text-white mb-4">Missions</h1>
    <nav class="text-green-100 text-sm flex items-center gap-2">
      <a routerLink="/" class="hover:text-white transition-colors">Accueil</a>
      <span class="text-green-300">›</span>
      <a routerLink="/ministere/ministre" class="hover:text-white transition-colors">Ministère</a>
      <span class="text-green-300">›</span>
      <span class="text-white font-medium">Missions</span>
    </nav>
  </div>
</div>

<section class="py-16 bg-[#F7F6F3]">
  <div class="container mx-auto px-4">
    <div class="max-w-7xl mx-auto">

      <!-- Cas 1 : missions spécifiques -->
      <div *ngIf="missions() && missions().length > 0; else checkMissionGeneral">

        <div class="mb-10">
          <p class="text-xs font-semibold tracking-[0.2em] uppercase text-[#00843B]">Attributions</p>
          <p class="text-gray-500 text-sm mt-1">
            À ce titre, le Ministère est chargé des missions suivantes.
          </p>
        </div>

        <div class="flex flex-col gap-4">
          <ng-container *ngFor="let mission of missions(); let i = index">
            <article class="group bg-white rounded-2xl border border-gray-200/80 shadow-sm hover:shadow-md hover:border-gray-300 transition-all duration-200">

              <!-- En-tête -->
              <button
                type="button"
                  (click)="toggleMission(i)"
                  class="w-full flex items-center gap-4 p-5 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-[#00843B] focus-visible:ring-offset-2 rounded-2xl">

                <!-- Numéro d'article façon texte officiel -->
                <div class="flex-shrink-0 flex flex-col items-center justify-center w-14 h-14 rounded-xl bg-[#00843B]/[0.06] border border-[#00843B]/10">
                  <span class="font-serif text-[10px] uppercase tracking-wide text-[#00843B]/60 leading-none">Art.</span>
                  <span class="font-serif text-lg font-semibold text-[#00843B] leading-tight">
                    {{ (i + 1) < 10 ? '0' + (i + 1) : (i + 1) }}
                  </span>
                </div>

                <h3 class="flex-1 font-serif text-lg font-semibold text-gray-900 group-hover:text-[#00843B] transition-colors">
                  {{ mission.categorie }}
                </h3>

                <svg
                  [ngClass]="{'rotate-180': isOpen(i)}"
                  class="w-5 h-5 text-gray-400 flex-shrink-0 transform transition-transform duration-200"
                  fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>

              <!-- Contenu -->
              <div *ngIf="isOpen(i)" class="px-5 pb-6 overflow-hidden">
                <div class="pl-[4.5rem]">
                  <div class="border-l-2 border-[#00843B]/15 pl-5 min-w-0">
                    <div
                      class="max-w-none min-w-0 text-gray-600 leading-relaxed
                            [&_*]:!whitespace-normal [&_*]:!break-words [&_*]:[overflow-wrap:anywhere]
                            [&_p]:my-2 [&_strong]:text-gray-800 [&_strong]:font-semibold
                            [&_ul]:list-disc [&_ul]:pl-5 [&_ul]:my-2 [&_ul]:space-y-1
                            [&_ol]:list-decimal [&_ol]:pl-5 [&_ol]:my-2 [&_ol]:space-y-1
                            [&_li]:leading-relaxed
                            [&_a]:text-[#00843B] [&_a]:underline"
                      [innerHTML]="mission.description">
                    </div>
                  </div>
                </div>
              </div>
            </article>
          </ng-container>
        </div>
      </div>

      <!-- Cas 2 : pas de missions spécifiques mais mission générale existe -->
      <ng-template #checkMissionGeneral>
        <div *ngIf="ministere()?.missionGeneral as mission; else noMission">
          <div class="mb-6">
            <p class="text-xs font-semibold tracking-[0.2em] uppercase text-[#00843B]">Attributions</p>
          </div>
          <article class="bg-white rounded-2xl border border-gray-200/80 shadow-sm p-8 md:p-10">
            <div
              class="prose max-w-none text-gray-700 leading-relaxed text-justify
                     prose-p:my-3 prose-strong:text-gray-900 prose-headings:font-serif"
              [innerHTML]="formatContent(mission)">
            </div>
          </article>
        </div>
      </ng-template>

      <!-- Cas 3 : aucune mission -->
      <ng-template #noMission>
        <div class="text-center py-20 bg-white rounded-2xl border border-dashed border-gray-300">
          <svg class="w-14 h-14 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
          </svg>
          <h3 class="font-serif text-lg font-medium text-gray-600 mb-1">Aucune mission renseignée</h3>
          <p class="text-gray-400 text-sm">Les attributions de ce ministère seront affichées ici.</p>
        </div>
      </ng-template>

    </div>
  </div>
</section>
